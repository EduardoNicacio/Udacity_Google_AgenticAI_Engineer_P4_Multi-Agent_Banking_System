sources:
  deposit:
    kind: mysql
    host: ${MYSQL_HOST}
    port: ${MYSQL_PORT:3306}
    database: bank
    user: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
tools:
  get_accounts:
    kind: mysql-sql
    source: deposit
    description: Get a list of all deposit accounts for the user.
    statement: SELECT * FROM accounts;
  get_balance:
    kind: mysql-sql
    source: deposit
    description: Get the current balance for a specific deposit account.
    parameters:
      - name: id
        type: string
        description: The ID of the account.
    statement: SELECT balance FROM accounts WHERE id = ?
  get_transactions:
    kind: mysql-sql
    source: deposit
    description: Get recent transactions for a specific account.
    parameters:
      - name: account_id
        type: string
        description: The ID of the account.
    statement: SELECT * FROM transactions WHERE account_id = ?
  check_minimum_balance:
    kind: mysql-sql
    source: deposit
    description: Check if the total sum of all deposit account balances is greater than a target amount. Returns 1 (true) or 0 (false).
    parameters:
      - name: target_amount
        type: string
        description: The target amount to check against.
    statement: SELECT (SUM(balance) > ?) AS has_minimum_balance FROM accounts
